<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Oleo+Script:wght@700&family=Quicksand:wght@300;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="shared.css" />
    <link rel="stylesheet" href="styles.css" />
    <title>Travel Goals</title>
  </head>
  <style>
    /* Reset mặc định */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Quicksand", sans-serif;
      color: #333;
    }

    ul {
      list-style: none;
    }

    a {
      text-decoration: none;
      color: inherit;
    }
    /* ================= HEADER ================= */

    header {
      position: absolute;
      width: 100%;
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    #page-logo a {
      font-family: "Oleo Script", cursive;
      font-size: 32px;
      color: #ffe600;
    }

    header ul {
      display: flex;
      gap: 40px;
    }

    header nav a {
      color: white;
      font-weight: 500;
      font-size: 18px;
    }

    /* ================= HERO ================= */

    #hero {
      height: 90vh;
      background-image: url("images/ocean.jpg"); /* đổi đúng tên ảnh của bạn */
      background-position: center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #hero-content {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 50px 70px;
      text-align: center;
      border-radius: 8px;
      color: white;
    }

    #hero-content h1 {
      font-family: "Raleway", sans-serif;
      font-size: 48px;
      margin-bottom: 15px;
    }

    #hero-content p {
      font-size: 20px;
      margin-bottom: 25px;
    }

    #hero-content a {
      background-color: #ffd000;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: bold;
      color: black;
      display: inline-block;
    }

    /* ================= HIGHLIGHTS ================= */

    #highlights {
      background-color: #dff5fa;
      padding: 60px 0;
      text-align: center;
    }

    #highlights h2 {
      font-family: "Raleway", sans-serif;
      font-size: 32px;
      margin-bottom: 40px;
    }

    #destinations {
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    .destination {
      width: 280px;
    }

    .destination img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
    }

    .destination p {
      margin-top: 15px;
      font-size: 18px;
    }

    .destination strong {
      color: #0077aa;
    }

    /* ================= FOOTER ================= */

    footer {
      background-color: #1f1f1f;
      padding: 20px 0;
    }

    footer ul {
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    footer img {
      width: 30px;
      height: 30px;
    }
  </style>
  <body>
    <header>
      <div id="page-logo">
        <a href="/index.html">Travel Goals</a>
      </div>
      <nav>
        <ul>
          <li><a href="/places.html">Destinations</a></li>
          <li><a href="">About</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="hero">
        <div id="hero-content">
          <h1>Joe's Travel Page</h1>
          <p>Let's explore the world together!</p>
          <a href="/places.html">Discover places</a>
        </div>
      </section>
      <section id="highlights">
        <h2>Highlights</h2>
        <ul id="destinations">
          <li class="destination">
            <img
              src="images/places/miami.jpg"
              alt="Miami streets on sunny day"
            />
            <p>Miami <strong>USA</strong></p>
          </li>
          <li class="destination">
            <img
              src="images/places/munich.jpg"
              alt="Munich stadium in winter"
            />
            <p>Munich <strong>Germany</strong></p>
          </li>
          <li class="destination">
            <img
              src="images/places/barcelona.jpg"
              alt="Palm beach in Barcelona"
            />
            <p>Barcelona <strong>Spain</strong></p>
          </li>
        </ul>
      </section>
    </main>
    <footer>
      <ul>
        <li>
          <a href="https://www.instagram.com">
            <img src="images/icons/insta.png" alt="Instagram logo"
          /></a>
        </li>
        <li>
          <a href="https://www.facebook.com">
            <img src="images/icons/facebook.png" alt="Facebook logo"
          /></a>
        </li>
      </ul>
    </footer>
  </body>
</html>
