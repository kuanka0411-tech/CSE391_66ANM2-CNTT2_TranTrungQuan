<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đặt Hàng</title>

    <style>
      body {
        font-family: Arial;
        background: #f5f5f5;
      }

      .container {
        width: 450px;
        margin: auto;
        margin-top: 40px;
        background: white;
        padding: 20px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
      }

      .error {
        color: red;
        font-size: 13px;
      }

      .counter {
        font-size: 12px;
        text-align: right;
      }

      .total {
        font-weight: bold;
        margin-top: 10px;
      }

      #confirmBox {
        display: none;
        border: 1px solid #ccc;
        padding: 15px;
        margin-top: 15px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Đặt Hàng</h2>

      <form id="orderForm">
        <label>Sản phẩm</label>
        <select id="product">
          <option value="">-- Chọn sản phẩm --</option>
          <option value="Áo">Áo</option>
          <option value="Quần">Quần</option>
          <option value="Giày">Giày</option>
        </select>
        <div class="error" id="productError"></div>

        <label>Số lượng</label>
        <input id="quantity" type="number" />
        <div class="error" id="quantityError"></div>

        <label>Ngày giao</label>
        <input id="date" type="date" />
        <div class="error" id="dateError"></div>

        <label>Địa chỉ</label>
        <input id="address" />
        <div class="error" id="addressError"></div>

        <label>Ghi chú</label>
        <textarea id="note"></textarea>
        <div class="counter" id="counter">0/200</div>

        <label>Thanh toán</label>
        <br />
        <input type="radio" name="pay" value="COD" /> COD
        <input type="radio" name="pay" value="Bank" /> Chuyển khoản
        <input type="radio" name="pay" value="Ewallet" /> Ví điện tử
        <div class="error" id="payError"></div>

        <div class="total" id="total">Tổng tiền: 0</div>

        <br />

        <button type="submit">Đặt hàng</button>
      </form>

      <div id="confirmBox"></div>
    </div>

    <script>
      const prices = {
        Áo: 150000,
        Quần: 200000,
        Giày: 300000,
      };

      const product = document.getElementById("product");
      const quantity = document.getElementById("quantity");
      const total = document.getElementById("total");

      function updateTotal() {
        let p = product.value;
        let q = Number(quantity.value);

        if (prices[p] && q > 0) {
          let money = prices[p] * q;

          total.innerText =
            "Tổng tiền: " + money.toLocaleString("vi-VN") + " đ";
        }
      }

      product.addEventListener("change", updateTotal);
      quantity.addEventListener("input", updateTotal);

      const note = document.getElementById("note");
      const counter = document.getElementById("counter");

      note.addEventListener("input", () => {
        let len = note.value.length;

        counter.innerText = len + "/200";

        if (len > 200) {
          counter.style.color = "red";
        } else {
          counter.style.color = "black";
        }
      });

      document
        .getElementById("orderForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          let p = product.value;
          let q = quantity.value;

          if (p === "") {
            alert("Chọn sản phẩm");
            return;
          }

          if (q < 1 || q > 99) {
            alert("Số lượng 1-99");
            return;
          }

          let money = prices[p] * q;

          let box = document.getElementById("confirmBox");

          box.style.display = "block";

          box.innerHTML = `
<h3>Xác nhận đơn hàng</h3>
<p>Sản phẩm: ${p}</p>
<p>Số lượng: ${q}</p>
<p>Tổng tiền: ${money.toLocaleString("vi-VN")} đ</p>

<button onclick="success()">Xác nhận</button>
<button onclick="cancel()">Hủy</button>
`;
        });

      function success() {
        alert("Đặt hàng thành công 🎉");
      }

      function cancel() {
        document.getElementById("confirmBox").style.display = "none";
      }
    </script>
  </body>
</html>
