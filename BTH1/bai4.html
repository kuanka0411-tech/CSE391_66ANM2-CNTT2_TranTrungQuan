<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Employee Form</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
      }
      .container {
        width: 520px;
        margin: 20px auto;
        background: #fff;
        padding: 15px 20px;
        border: 1px solid #ccc;
      }
      h3 {
        margin-top: 20px;
        border-bottom: 1px solid #ccc;
        padding-bottom: 5px;
        font-size: 14px;
      }
      .row {
        display: flex;
        margin: 6px 0;
        align-items: center;
      }
      .row label {
        width: 130px;
        font-size: 13px;
      }
      .row input,
      .row select,
      textarea {
        flex: 1;
        padding: 4px;
        font-size: 13px;
      }
      textarea {
        height: 90px;
      }
      .radio-group label {
        width: auto;
        margin-right: 15px;
        font-size: 13px;
      }
      .actions {
        margin-top: 15px;
        text-align: right;
      }
      button {
        padding: 5px 12px;
        font-size: 13px;
        cursor: pointer;
      }
      .captcha {
        font-family: monospace;
        font-size: 20px;
        letter-spacing: 4px;
        background: #eee;
        padding: 5px 10px;
        display: inline-block;
        margin-right: 10px;
      }
      .note {
        font-size: 11px;
        margin-top: 8px;
      }
      .no-border {
        border: none;
        background: transparent;
        padding-left: 0;
        outline: none;
      }
      .radio-col {
        display: flex;
        flex-direction: column;
      }

      .radio-col label {
        font-size: 13px;
        margin-bottom: 3px;
      }
      .shift-col {
        display: flex;
        flex-direction: column;
        font-size: 13px;
      }

      .shift-col label {
        margin-bottom: 3px;
      }

      .captcha-wrap {
        display: flex;
        flex-direction: column;
      }

      .captcha-line {
        display: flex;
        align-items: center;
        margin-bottom: 4px;
      }

      .captcha-text {
        font-family: monospace;
        font-size: 22px;
        letter-spacing: 5px;
        background: #f0f0f0;
        padding: 6px 12px;
        margin-right: 10px;
      }

      .captcha-change {
        font-size: 12px;
        color: #555;
        cursor: pointer;
      }

      .captcha-wrap input {
        width: 100%;
        padding: 4px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>Basic Info</h3>

      <div class="row">
        <label>Employee ID</label>
        <input type="text" value="9" readonly class="no-border" />
      </div>

      <div class="row">
        <label>Last Name</label>
        <input type="text" value="Dodsworth" class="no-border" />
      </div>

      <div class="row">
        <label>First Name</label>
        <input type="text" value="Anne" />
      </div>
      <div class="row">
        <label>Gender</label>
        <div class="radio-col">
          <label><input type="radio" name="gender" /> Male</label>
          <label><input type="radio" name="gender" /> Female</label>
          <label><input type="radio" name="gender" /> XXX</label>
          <label><input type="radio" name="gender" checked /> ZZZ</label>
        </div>
      </div>

      <div class="row">
        <label>Title</label>
        <input type="text" value="Sales Representative" />
      </div>

      <div class="row">
        <label>Suffix</label>
        <input type="text" value="Ms." />
      </div>

      <div class="row">
        <label>BirthDate</label>
        <input type="text" value="1969-07-02 00:00:00" />
      </div>

      <div class="row">
        <label>HireDate</label>
        <input type="text" value="1994-11-15 00:00:00" />
      </div>
      <div class="row">
        <label>SSN # (if applicable)</label>
        <input type="text" />
      </div>

      <div class="row">
        <label>Reports To</label>
        <select>
          <option>Buchanan</option>
          <option>Fuller</option>
        </select>
      </div>

      <h3>Contact Info</h3>

      <div class="row">
        <label>Email</label>
        <input type="email" placeholder="name@example.com" />
      </div>

      <div class="row">
        <label>Address</label>
        <input type="text" value="7 Houndstooth Rd." />
      </div>

      <div class="row">
        <label>City</label>
        <input type="text" value="London" />
      </div>

      <div class="row">
        <label>Region</label>
        <input type="text" />
      </div>

      <div class="row">
        <label>Postal Code</label>
        <input type="text" value="WG2 7LT" />
      </div>

      <div class="row">
        <label>Country</label>
        <select>
          <option>Russian Federation</option>
          <option>USA</option>
          <option>UK</option>
        </select>
      </div>

      <div class="row">
        <label>US Home Phone</label>
        <input type="text" value="(234)234-2342" />
      </div>

      <div class="row">
        <label>Photo</label>
        <input type="text" value="EmpID9.bmp" />
      </div>

      <h3>Optional Info</h3>

      <div class="row">
        <label>Notes</label>
        <textarea>
Anne has a BA degree in English from St. Lawrence College.
She is fluent in French and German. ZZZ
        </textarea>
      </div>
      <div class="row">
        <label>Preferred Shift</label>
        <div class="shift-col">
          <label><input type="radio" name="shift" /> Regular</label>
          <label><input type="radio" name="shift" checked /> Gravy Yard</label>
        </div>
      </div>

      <div class="row">
        <label>Active?</label>
        <input type="checkbox" checked />
      </div>

      <div class="row">
        <label>Are you human?</label>
        <div class="captcha-wrap">
          <div class="captcha-line">
            <span class="captcha-text">TIDAWD</span>
            <span class="captcha-change">Click to change</span>
          </div>
          <input type="text" />
        </div>
      </div>
      <div class="actions">
        <button>Submit</button> <button type="reset">Cancel</button>
      </div>
      <div class="note">* required</div>
    </div>
  </body>
</html>
